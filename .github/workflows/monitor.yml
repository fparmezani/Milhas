name: Monitor de Milhas

on:
  schedule:
    # Roda a cada 6 horas (0h, 6h, 12h, 18h — horário UTC = -3h Brasília)
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:
    # Permite rodar manualmente pela aba Actions no GitHub

permissions:
  contents: write

jobs:
  monitorar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: node scraper/index.js

      - name: Salvar resultados no repositório
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/promotions.json
          git diff --staged --quiet || git commit -m "chore: atualizar promoções [skip ci]"
          git push
